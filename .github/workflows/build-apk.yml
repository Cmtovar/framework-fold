name: Build & Release APK

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build Debug APK
        if: github.ref != 'refs/heads/main' || github.event_name != 'push'
        run: ./gradlew assembleDebug

      - name: Build Release APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get version name
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -o '"[^"]*"' | tr -d '"')
          echo "name=v${VERSION}-build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: ${{ steps.version.outputs.name }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
