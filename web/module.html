<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #141418;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.wrapper {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.button-row {
  display: flex;
  gap: 6px;
  margin-top: 12px;
}

.btn-small {
  width: 24px;
  height: 24px;
  border-radius: 4px;
  background: #26262e;
  border: 1px solid #3a3a44;
  cursor: pointer;
  flex-shrink: 0;
}

.btn-bar {
  flex: 1;
  height: 24px;
  border-radius: 4px;
  background: #26262e;
  border: 1px solid #3a3a44;
  cursor: pointer;
}

.module {
  display: flex;
  gap: 22px;
}

.group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.group-title {
  color: #e8e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  font-weight: 700;
}

.group-columns {
  display: flex;
  gap: 14px;
}

.column {
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
}
.column.spotlight {
  background: #26262e;
  border-radius: 6px;
  padding: 4px;
  margin: -4px;
}
.column.spotlight .square.filled {
  background: #c0c0cc;
}

.square {
  width: 24px;
  height: 24px;
  border-radius: 2px;
  background: #1a1a20;
}
.square.filled {
  background: #8a8a96;
}

.col-label {
  color: #a8a8b4;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="module" id="module"></div>
  <div class="button-row">
    <button class="btn-small" id="btn-reset"></button>
    <button class="btn-bar" id="btn-advance"></button>
  </div>
</div>
<script>
const mod = document.getElementById('module');
const labels = ['on','at','at','in','at','in','on','at'];
const fills = [8,1,1,4,1,4,8,1];
const groups = [
  { title: 'Rest', cols: [0,1,2,3] },
  { title: 'Switch Out', cols: [4,5,6,7] }
];

groups.forEach(g => {
  const group = document.createElement('div');
  group.className = 'group';

  const title = document.createElement('div');
  title.className = 'group-title';
  title.textContent = g.title;
  group.appendChild(title);

  const cols = document.createElement('div');
  cols.className = 'group-columns';

  g.cols.forEach(c => {
    const col = document.createElement('div');
    col.className = 'column';
    const lbl = document.createElement('div');
    lbl.className = 'col-label';
    lbl.textContent = labels[c];
    col.appendChild(lbl);
    for (let r = 0; r < 8; r++) {
      const sq = document.createElement('div');
      const value = 8 - r;
      sq.className = value === fills[c] ? 'square filled' : 'square';
      col.appendChild(sq);
    }
    cols.appendChild(col);
  });

  group.appendChild(cols);
  mod.appendChild(group);
});

// Spotlight logic
const allColumns = document.querySelectorAll('.column');
let spotIndex = 0;

function updateSpotlight() {
  allColumns.forEach((col, i) => {
    col.classList.toggle('spotlight', i === spotIndex);
  });
}

function advance() {
  if (spotIndex < allColumns.length - 1) {
    spotIndex++;
    updateSpotlight();
  }
}

function reset() {
  spotIndex = 0;
  updateSpotlight();
}

document.getElementById('btn-advance').addEventListener('click', advance);
document.getElementById('btn-reset').addEventListener('click', reset);
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); advance(); }
  if (e.code === 'KeyR') { reset(); }
});

updateSpotlight();
</script>
</body>
</html>
