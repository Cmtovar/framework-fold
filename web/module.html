<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #141418;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.page-layout {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.sidebar {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 360px;
  overflow-y: auto;
  padding-right: 4px;
}
.sidebar::-webkit-scrollbar {
  width: 4px;
}
.sidebar::-webkit-scrollbar-track {
  background: #1a1a20;
  border-radius: 2px;
}
.sidebar::-webkit-scrollbar-thumb {
  background: #3a3a44;
  border-radius: 2px;
}

.sidebar-cell {
  display: flex;
  gap: 2px;
  padding: 8px;
  background: #1e1e24;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid transparent;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
}
.sidebar-cell.active {
  border-color: #4a4a58;
  background: #26262e;
}
.sidebar-cell.core {
  background: #22222a;
  box-shadow: 0 0 0 2px #2a2a34;
}

.mini-col {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.mini-sq {
  width: 4px;
  height: 4px;
  border-radius: 1px;
  background: #1a1a20;
}
.mini-sq.filled {
  background: #8a8a96;
}

.wrapper {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.button-row {
  display: flex;
  gap: 6px;
  margin-top: 12px;
}

.btn-small {
  width: 24px;
  height: 24px;
  border-radius: 4px;
  background: #26262e;
  border: 1px solid #3a3a44;
  cursor: pointer;
  flex-shrink: 0;
}

.btn-bar {
  flex: 1;
  height: 24px;
  border-radius: 4px;
  background: #26262e;
  border: 1px solid #3a3a44;
  cursor: pointer;
}

.module {
  display: flex;
  gap: 16px;
  width: 340px;
  justify-content: center;
}
.module.flat {
  gap: 0;
}
.module.flat .group-title {
  visibility: hidden;
}
.module.flat .group {
  width: auto;
}
.module.flat .group:first-child .group-columns {
  padding-right: 7px;
}
.module.flat .group:last-child .group-columns {
  padding-left: 7px;
}

.group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  width: 150px;
}

.group-title {
  color: #e8e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  font-weight: 700;
}

.group-columns {
  display: flex;
  gap: 14px;
  width: fit-content;
}

.column {
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
}
.column.spotlight {
  background: #26262e;
  border-radius: 6px;
  padding: 4px;
  margin: -4px;
}
.column.spotlight .square.filled {
  background: #c0c0cc;
}

.square {
  width: 24px;
  height: 24px;
  border-radius: 2px;
  background: #1a1a20;
}
.square.filled {
  background: #8a8a96;
}

.col-label {
  color: #a8a8b4;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  width: 24px;
}
</style>
</head>
<body>
<div class="page-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="wrapper">
    <div class="module" id="module"></div>
    <div class="button-row">
      <button class="btn-small" id="btn-reset" tabindex="-1"></button>
      <button class="btn-small" id="btn-toggle" tabindex="-1"></button>
      <button class="btn-bar" id="btn-advance" tabindex="-1"></button>
    </div>
  </div>
</div>
<script>
const slotWords = {1:'at',2:'to',3:'by',4:'in',5:'away',6:'of',7:'out',8:'on'};
const cellNames = {
  '0,0':'Adaptation','0,1':'Rest','0,2':'Diagnose','0,3':'Itemize',
  '1,0':'Attempt','1,1':'Realization','1,2':'Work','1,3':'Mobilization',
  '2,0':'Coverage','2,1':'Showing Up','2,2':'Friction','2,3':'Travelling',
  '3,0':'Maintain','3,1':'Utilization','3,2':'Rearrange','3,3':'Switch Out'
};
const orders = {
  '0,0':[4,1,5,4],'0,1':[8,1,1,4],'0,2':[8,7,1,6],'0,3':[4,7,5,6],
  '1,0':[3,8,6,5],'1,1':[7,8,2,5],'1,2':[7,3,2,2],'1,3':[3,3,6,2],
  '2,0':[2,2,7,3],'2,1':[6,2,3,3],'2,2':[6,5,3,8],'2,3':[2,5,7,8],
  '3,0':[1,6,8,7],'3,1':[5,6,4,7],'3,2':[5,4,4,1],'3,3':[1,4,8,1]
};

// Chute pairs: middle-column cell (col 1 or 2) on left, partner on right
// The first six pairs receive the emphasized sidebar treatment. The first two
// (Rest ↔ Switch Out, Realization ↔ Travelling) are the foundational core.
const chutePairs = [
  { left: '0,1', right: '3,3' },  // Rest ↔ Switch Out (core) — awareness
  { left: '1,1', right: '2,3' },  // Realization ↔ Travelling (core) — elasticity
  { left: '1,2', right: '2,0' },  // Work ↔ Coverage (core) — momentum
  { left: '2,1', right: '1,3' },  // Showing Up ↔ Mobilization — heat
  { left: '2,2', right: '1,0' },  // Friction ↔ Attempt — lying
  { left: '3,1', right: '0,3' },  // Utilization ↔ Itemize — carrying objects
  { left: '3,2', right: '0,0' },  // Rearrange ↔ Adaptation — web
  { left: '0,2', right: '3,0' },  // Diagnose ↔ Maintain — texture
];

function getPairData(pair) {
  const lo = orders[pair.left];
  const ro = orders[pair.right];
  return {
    leftName: cellNames[pair.left],
    rightName: cellNames[pair.right],
    fills: [...lo, ...ro],
    labels: [...lo.map(v => slotWords[v]), ...ro.map(v => slotWords[v])]
  };
}

let activePair = 0;
let isFlat = false;

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  chutePairs.forEach((pair, i) => {
    const d = getPairData(pair);
    const cell = document.createElement('div');
    cell.className = 'sidebar-cell' + (i === activePair ? ' active' : '') + (i < 6 ? ' core' : '');
    for (let c = 0; c < 8; c++) {
      if (c === 4 && !isFlat) {
        const spacer = document.createElement('div');
        spacer.style.width = '3px';
        cell.appendChild(spacer);
      }
      const mc = document.createElement('div');
      mc.className = 'mini-col';
      for (let r = 0; r < 8; r++) {
        const sq = document.createElement('div');
        const value = 8 - r;
        sq.className = value === d.fills[c] ? 'mini-sq filled' : 'mini-sq';
        mc.appendChild(sq);
      }
      cell.appendChild(mc);
    }
    cell.addEventListener('click', () => {
      activePair = i;
      buildSidebar();
      buildModule();
    });
    sidebar.appendChild(cell);
  });
}

function buildModule() {
  const mod = document.getElementById('module');
  mod.innerHTML = '';
  const d = getPairData(chutePairs[activePair]);

  [{ title: d.leftName, cols: [0,1,2,3] },
   { title: d.rightName, cols: [4,5,6,7] }].forEach(g => {
    const group = document.createElement('div');
    group.className = 'group';

    const title = document.createElement('div');
    title.className = 'group-title';
    title.textContent = g.title;
    group.appendChild(title);

    const cols = document.createElement('div');
    cols.className = 'group-columns';

    g.cols.forEach(c => {
      const col = document.createElement('div');
      col.className = 'column';
      const lbl = document.createElement('div');
      lbl.className = 'col-label';
      lbl.textContent = d.labels[c];
      col.appendChild(lbl);
      for (let r = 0; r < 8; r++) {
        const sq = document.createElement('div');
        const value = 8 - r;
        sq.className = value === d.fills[c] ? 'square filled' : 'square';
        col.appendChild(sq);
      }
      cols.appendChild(col);
    });

    group.appendChild(cols);
    mod.appendChild(group);
  });

  spotIndex = 0;
  updateSpotlight();
}

// Spotlight logic
let spotIndex = 0;

function updateSpotlight() {
  const cols = document.querySelectorAll('.column');
  cols.forEach((col, i) => {
    col.classList.toggle('spotlight', i === spotIndex);
  });
}

function advance() {
  const cols = document.querySelectorAll('.column');
  if (spotIndex < cols.length - 1) {
    spotIndex++;
    updateSpotlight();
  }
}

function reset() {
  spotIndex = 0;
  updateSpotlight();
}

buildSidebar();
buildModule();

document.getElementById('btn-advance').addEventListener('click', advance);
document.getElementById('btn-reset').addEventListener('click', reset);
document.getElementById('btn-toggle').addEventListener('click', () => {
  isFlat = !isFlat;
  document.getElementById('module').classList.toggle('flat');
  buildSidebar();
});
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); advance(); }
  if (e.code === 'KeyR') { reset(); }
});
</script>
</body>
</html>
