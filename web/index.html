<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Framework Fold</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a1a;
  color: #999;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  user-select: none;
}

#grid-container {
  position: relative;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  width: 100%;
}

.cell {
  position: relative;
  background: #333;
  border-radius: 8px;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  overflow: visible;
  transition: background 0.15s;
  container-type: inline-size;
}
.cell.active { background: #444; }

.cell-words {
  position: absolute;
  top: 5%;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 0.4em;
  font-size: 7cqi;
  font-weight: 600;
  color: #4a4a4a;
}
.cell.active .cell-words { color: #999; }

.cell-distance {
  position: absolute;
  top: 3%;
  right: 6%;
  font-size: 9cqi;
  font-weight: 800;
  color: #3a3a3a;
}
.cell.active .cell-distance { color: #666; }

.cell-coord {
  position: absolute;
  top: 3%;
  left: 4%;
  font-size: 9cqi;
  font-weight: 800;
  color: #3a3a3a;
  letter-spacing: 1px;
}
.cell.active .cell-coord { color: #666; }

.cell-slots {
  display: flex;
  justify-content: space-between;
  width: 80%;
  margin-top: 2px;
}
.slot {
  width: 8.5%;
  aspect-ratio: 1;
  border-radius: 2px;
  background: #2a2a2a;
}
.slot.shaded { background: #666; }

.cell-name {
  position: absolute;
  bottom: 4%;
  font-size: 7cqi;
  font-weight: 600;
  color: #4a4a4a;
}
.cell.active .cell-name { color: #999; }

.cell-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#connections-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.cell { z-index: 1; }

.column-titles {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  width: 100%;
  max-width: 100%;
  margin-top: 4px;
}
.column-titles span {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: #404040;
}

.legend {
  display: flex;
  gap: 20px;
  margin-top: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: #555;
}
.legend-line {
  width: 20px;
  height: 2px;
}

#nav-controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  margin-top: 16px;
}
#nav-controls .nav-row {
  display: flex;
  gap: 6px;
}
.nav-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #2a2a2a;
  border: none;
  color: #888;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}
.nav-btn:hover:not(:disabled) { background: #444; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

#tree-container {
  width: 100%;
  max-width: 100%;
  margin-top: 16px;
}
#tree-canvas {
  width: 100%;
  height: 280px;
  cursor: pointer;
}

@media (max-width: 480px) {
  .cell-words { font-size: 7px; gap: 3px; }
  .cell-distance { font-size: 12px; }
  .cell-coord { font-size: 8px; }
  .slot { width: 5px; height: 5px; }
  .cell-slots { gap: 1px; }
  .cell-name { font-size: 7px; bottom: 2px; }
  .nav-btn { width: 40px; height: 40px; font-size: 14px; }
  #tree-canvas { height: 200px; }
}
</style>
</head>
<body>

<div id="grid-container">
  <canvas id="connections-canvas"></canvas>
</div>

<div class="column-titles">
  <span>Exposure</span>
  <span>Abundance</span>
  <span>Investment</span>
  <span>Occlusion</span>
</div>

<div class="legend">
  <div class="legend-item">
    <canvas class="legend-line" width="20" height="2" id="legend-step"></canvas>
    <span>Step (1)</span>
  </div>
  <div class="legend-item">
    <canvas class="legend-line" width="20" height="2" id="legend-jump"></canvas>
    <span>Jump (2)</span>
  </div>
  <div class="legend-item">
    <canvas class="legend-line" width="20" height="2" id="legend-chute"></canvas>
    <span>Chute / Ladder</span>
  </div>
</div>

<div id="nav-controls">
  <div class="nav-row"><button class="nav-btn" id="btn-up">W</button></div>
  <div class="nav-row">
    <button class="nav-btn" id="btn-left">A</button>
    <button class="nav-btn" id="btn-chute">/</button>
    <button class="nav-btn" id="btn-right">D</button>
  </div>
  <div class="nav-row"><button class="nav-btn" id="btn-down">S</button></div>
</div>

<div id="tree-container">
  <canvas id="tree-canvas"></canvas>
</div>

<script>
const ROWS = 4, COLS = 4, SLOTS = 9;

const slotWords = {1:'at',2:'to',3:'by',4:'in',5:'away',6:'of',7:'out',8:'on',9:'up'};

const cellNames = {
  '0,0':'Adaptation','0,1':'Rest','0,2':'Diagnose','0,3':'Itemize',
  '1,0':'Attempt','1,1':'Realization','1,2':'Work','1,3':'Mobilization',
  '2,0':'Coverage','2,1':'Showing Up','2,2':'Friction','2,3':'Travelling',
  '3,0':'Maintain','3,1':'Utilization','3,2':'Rearrange','3,3':'Switch Out'
};

const shades = {
  '0,0':[1,4,5,9],'0,1':[1,4,8,9],'0,2':[1,6,7,8,9],'0,3':[4,5,6,7,9],
  '1,0':[3,5,6,8,9],'1,1':[2,5,7,8,9],'1,2':[2,3,7,9],'1,3':[2,3,6,9],
  '2,0':[2,3,7,9],'2,1':[2,3,6,9],'2,2':[3,5,6,8,9],'2,3':[2,5,7,8,9],
  '3,0':[1,6,7,8,9],'3,1':[4,5,6,7,9],'3,2':[1,4,5,9],'3,3':[1,4,8,9]
};

const orders = {
  '0,0':{path:[4,1,5,4,9],arcs:[1,3]},
  '0,1':{path:[8,1,1,4,9],arcs:[0,3]},
  '0,2':{path:[8,7,1,6,9],arcs:[1,3]},
  '0,3':{path:[4,7,5,6,9],arcs:[0,1,3]},
  '1,0':{path:[3,8,6,5,9],arcs:[0,3]},
  '1,1':{path:[7,8,2,5,9],arcs:[1,3]},
  '1,2':{path:[7,3,2,2,9],arcs:[3]},
  '1,3':{path:[3,3,6,2,9],arcs:[2,3]},
  '2,0':{path:[2,2,7,3,9],arcs:[1,3]},
  '2,1':{path:[6,2,3,3,9],arcs:[0,3]},
  '2,2':{path:[6,5,3,8,9],arcs:[2]},
  '2,3':{path:[2,5,7,8,9],arcs:[]},
  '3,0':{path:[1,6,8,7,9],arcs:[1,3]},
  '3,1':{path:[5,6,4,7,9],arcs:[1,2,3]},
  '3,2':{path:[5,4,4,1,9],arcs:[3]},
  '3,3':{path:[1,4,8,1,9],arcs:[2,3]}
};

// Horizontal: 0->2 (jump), 2->3 (step), 3->1 (jump), 1->0 (step)
const horizNext = {0:{target:2,jump:true},2:{target:3,jump:false},3:{target:1,jump:true},1:{target:0,jump:false}};

const chuteDefs = [[0,0,3,2],[0,1,3,3],[0,2,3,0],[0,3,3,1],[1,0,2,2],[1,1,2,3],[2,0,1,2],[2,1,1,3]];
const chuteLookup = {};
chuteDefs.forEach(([r1,c1,r2,c2]) => {
  const a = r1*COLS+c1, b = r2*COLS+c2;
  chuteLookup[a] = b;
  chuteLookup[b] = a;
});

function getNeighbors(idx) {
  const r = Math.floor(idx/COLS), c = idx%COLS;
  const nb = [];
  if (r > 0) nb.push(idx - COLS);
  if (r < ROWS-1) nb.push(idx + COLS);
  const h = horizNext[c];
  nb.push(r*COLS + h.target);
  if (chuteLookup[idx] !== undefined) nb.push(chuteLookup[idx]);
  return nb;
}

function bfs(source) {
  const n = ROWS*COLS;
  const dist = Array(n).fill(-1);
  const parents = Array.from({length:n}, ()=>[]);
  dist[source] = 0;
  const queue = [source];
  let qi = 0;
  while (qi < queue.length) {
    const cur = queue[qi++];
    for (const nb of getNeighbors(cur)) {
      if (dist[nb] === -1) {
        dist[nb] = dist[cur]+1;
        parents[nb].push(cur);
        queue.push(nb);
      } else if (dist[nb] === dist[cur]+1) {
        parents[nb].push(cur);
      }
    }
  }
  return {dist, parents};
}

// Build connections list
const connections = [];
for (let r=0; r<ROWS; r++) {
  for (let c=0; c<COLS; c++) {
    const idx = r*COLS+c;
    if (r < ROWS-1) connections.push({from:idx, to:idx+COLS, type:'step', directed:false});
    const h = horizNext[c];
    connections.push({from:idx, to:r*COLS+h.target, type:h.jump?'jump':'step', directed:true});
  }
}
chuteDefs.forEach(([r1,c1,r2,c2]) => {
  connections.push({from:r1*COLS+c1, to:r2*COLS+c2, type:'chute', directed:false});
});

// Edge type lookup
const edgeTypes = {};
connections.forEach(c => {
  edgeTypes[`${c.from}-${c.to}`] = c.type;
  edgeTypes[`${c.to}-${c.from}`] = c.type;
});

// State
let activeIndex = 0;
let bfsResult = bfs(0);

// Build DOM
const gridContainer = document.getElementById('grid-container');
const cells = [];
const cellElements = [];

for (let r=0; r<ROWS; r++) {
  for (let c=0; c<COLS; c++) {
    const idx = r*COLS+c;
    const key = `${r},${c}`;
    const el = document.createElement('div');
    el.className = 'cell';
    el.dataset.idx = idx;

    const wordData = orders[key].path;
    const wordsHtml = wordData.map(s => slotWords[s]).join(' ');

    el.innerHTML = `
      <div class="cell-words">${wordData.map(s=>`<span>${slotWords[s]}</span>`).join('')}</div>
      <div class="cell-distance"></div>
      <div class="cell-coord">${key}</div>
      <div class="cell-slots">${Array.from({length:SLOTS},(_,i)=>`<div class="slot${shades[key].includes(i+1)?' shaded':''}" data-slot="${i+1}"></div>`).join('')}</div>
      <div class="cell-name">${cellNames[key]}</div>
      <canvas class="cell-canvas"></canvas>
    `;

    el.addEventListener('click', () => setActive(idx));
    gridContainer.appendChild(el);
    cellElements.push(el);
  }
}

function setActive(idx) {
  activeIndex = idx;
  bfsResult = bfs(idx);
  render();
}

function render() {
  cellElements.forEach((el, idx) => {
    const isActive = idx === activeIndex;
    el.classList.toggle('active', isActive);
    const distEl = el.querySelector('.cell-distance');
    const coordEl = el.querySelector('.cell-coord');
    if (isActive) {
      distEl.textContent = '';
      coordEl.style.display = 'none';
    } else {
      const d = bfsResult.dist[idx];
      distEl.textContent = d >= 0 ? d : '';
      coordEl.style.display = '';
    }
  });
  drawTraversalPaths();
  drawConnections();
  drawTree();
  updateNav();
}

function drawTraversalPaths() {
  cellElements.forEach((el, idx) => {
    const canvas = el.querySelector('.cell-canvas');
    const rect = el.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, rect.width, rect.height);

    const r = Math.floor(idx/COLS), c = idx%COLS;
    const key = `${r},${c}`;
    const {path, arcs} = orders[key];
    const isActive = idx === activeIndex;

    // Get slot positions
    const slots = el.querySelectorAll('.slot');
    const slotCenters = {};
    slots.forEach(s => {
      const sRect = s.getBoundingClientRect();
      slotCenters[s.dataset.slot] = {
        x: sRect.left - rect.left + sRect.width/2,
        y: sRect.top - rect.top + sRect.height/2
      };
    });

    const lineColor = isActive ? '#aaa' : '#888';
    const dotColor = isActive ? '#aaa' : '#888';

    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';

    for (let i=0; i<path.length-1; i++) {
      const fromSlot = path[i], toSlot = path[i+1];
      const from = slotCenters[fromSlot], to = slotCenters[toSlot];
      if (!from || !to) continue;

      ctx.beginPath();
      if (fromSlot === toSlot) {
        // Self-loop
        ctx.moveTo(from.x, from.y);
        ctx.bezierCurveTo(from.x-12, from.y+24, from.x+12, from.y+24, from.x, from.y);
      } else if (arcs.includes(i)) {
        const dx = Math.abs(to.x - from.x);
        const arcH = Math.max(dx*0.5, 20);
        const midX = (from.x+to.x)/2;
        const isLast = i === path.length-2;
        const midY = isLast ? from.y - arcH : from.y + arcH;
        ctx.moveTo(from.x, from.y);
        ctx.quadraticCurveTo(midX, midY, to.x, to.y);
      } else {
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
      }
      ctx.stroke();
    }

    // Dots
    ctx.fillStyle = dotColor;
    path.forEach(s => {
      const p = slotCenters[s];
      if (!p) return;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
      ctx.fill();
    });
  });
}

function drawConnections() {
  const canvas = document.getElementById('connections-canvas');
  const container = gridContainer;
  const rect = container.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, rect.width, rect.height);

  // Get cell centers relative to grid container
  const centers = cellElements.map(el => {
    const r = el.getBoundingClientRect();
    return {
      x: r.left - rect.left + r.width/2,
      y: r.top - rect.top + r.height/2
    };
  });

  ctx.lineCap = 'round';

  connections.forEach(conn => {
    const from = centers[conn.from], to = centers[conn.to];
    const isActive = conn.directed ? conn.from === activeIndex : (conn.from === activeIndex || conn.to === activeIndex);

    let color, width, dash;
    if (conn.type === 'chute') {
      color = isActive ? '#c47a4a' : '#5a3a2a';
      width = isActive ? 2.5 : 1.5;
      dash = [3,3];
    } else if (conn.type === 'jump') {
      color = isActive ? '#555' : '#2a2a2a';
      width = isActive ? 2.5 : 2;
      dash = [6,4];
    } else {
      color = isActive ? '#555' : '#2a2a2a';
      width = isActive ? 2.5 : 2;
      dash = [];
    }

    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.setLineDash(dash);
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();
  });
  ctx.setLineDash([]);
}

function drawTree() {
  const canvas = document.getElementById('tree-canvas');
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, rect.width, rect.height);

  const {dist, parents} = bfsResult;
  const n = ROWS*COLS;
  const nodeR = 18;
  const padding = 30;
  const w = rect.width, h = rect.height;

  // Group by level
  const levels = {};
  let maxDist = 0;
  for (let i=0; i<n; i++) {
    if (dist[i] === -1) continue;
    if (!levels[dist[i]]) levels[dist[i]] = [];
    levels[dist[i]].push(i);
    if (dist[i] > maxDist) maxDist = dist[i];
  }

  const levelGap = (h - padding*2) / Math.max(maxDist, 1);
  const pos = {};
  for (let d=0; d<=maxDist; d++) {
    const nodes = levels[d] || [];
    const spacing = w / (nodes.length+1);
    nodes.forEach((idx, i) => {
      pos[idx] = {x: spacing*(i+1), y: padding + d*levelGap};
    });
  }

  // Store positions for click detection
  canvas._nodePositions = pos;
  canvas._nodeRadius = nodeR;

  // Edges
  for (let i=0; i<n; i++) {
    if (dist[i] <= 0) continue;
    for (const p of parents[i]) {
      const pPos = pos[p], iPos = pos[i];
      if (!pPos || !iPos) continue;
      const type = edgeTypes[`${p}-${i}`] || 'step';

      if (type === 'chute') {
        ctx.strokeStyle = '#5a3a2a';
        ctx.setLineDash([3,3]);
      } else if (type === 'jump') {
        ctx.strokeStyle = '#2a2a2a';
        ctx.setLineDash([6,4]);
      } else {
        ctx.strokeStyle = '#2a2a2a';
        ctx.setLineDash([]);
      }
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(pPos.x, pPos.y);
      ctx.lineTo(iPos.x, iPos.y);
      ctx.stroke();
    }
  }
  ctx.setLineDash([]);

  // Nodes
  for (let i=0; i<n; i++) {
    const p = pos[i];
    if (!p) continue;
    const isSource = i === activeIndex;
    const r = Math.floor(i/COLS), c = i%COLS;

    ctx.beginPath();
    ctx.arc(p.x, p.y, nodeR, 0, Math.PI*2);
    ctx.fillStyle = isSource ? '#444' : '#333';
    ctx.fill();
    if (isSource) {
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Label
    ctx.fillStyle = isSource ? '#999' : '#555';
    ctx.font = `bold 11px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${r},${c}`, p.x, p.y);

    // Distance below
    if (!isSource && dist[i] > 0) {
      ctx.fillStyle = '#555';
      ctx.font = `10px -apple-system, sans-serif`;
      ctx.fillText(`${dist[i]}`, p.x, p.y + nodeR + 10);
    }
  }
}

// Tree click
document.getElementById('tree-canvas').addEventListener('click', (e) => {
  const canvas = e.target;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const pos = canvas._nodePositions;
  const r = canvas._nodeRadius;
  if (!pos) return;
  for (const [idx, p] of Object.entries(pos)) {
    const dx = x-p.x, dy = y-p.y;
    if (dx*dx+dy*dy <= r*r) {
      setActive(parseInt(idx));
      return;
    }
  }
});

// Navigation
function updateNav() {
  const r = Math.floor(activeIndex/COLS), c = activeIndex%COLS;
  document.getElementById('btn-up').disabled = r <= 0;
  document.getElementById('btn-down').disabled = r >= ROWS-1;
  document.getElementById('btn-left').disabled = !(c===3||c===1);
  document.getElementById('btn-right').disabled = !(c===0||c===2);
  document.getElementById('btn-chute').disabled = chuteLookup[activeIndex] === undefined;
}

document.getElementById('btn-up').addEventListener('click', () => {
  const r = Math.floor(activeIndex/COLS);
  if (r > 0) setActive(activeIndex - COLS);
});
document.getElementById('btn-down').addEventListener('click', () => {
  const r = Math.floor(activeIndex/COLS);
  if (r < ROWS-1) setActive(activeIndex + COLS);
});
document.getElementById('btn-left').addEventListener('click', () => {
  const c = activeIndex%COLS;
  const r = Math.floor(activeIndex/COLS);
  if (c===3) setActive(r*COLS+1);
  else if (c===1) setActive(r*COLS+0);
});
document.getElementById('btn-right').addEventListener('click', () => {
  const c = activeIndex%COLS;
  const r = Math.floor(activeIndex/COLS);
  if (c===0) setActive(r*COLS+2);
  else if (c===2) setActive(r*COLS+3);
});
document.getElementById('btn-chute').addEventListener('click', () => {
  if (chuteLookup[activeIndex] !== undefined) setActive(chuteLookup[activeIndex]);
});

// Keyboard
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'w' || key === 'arrowup') { document.getElementById('btn-up').click(); e.preventDefault(); }
  else if (key === 's' || key === 'arrowdown') { document.getElementById('btn-down').click(); e.preventDefault(); }
  else if (key === 'a' || key === 'arrowleft') { document.getElementById('btn-left').click(); e.preventDefault(); }
  else if (key === 'd' || key === 'arrowright') { document.getElementById('btn-right').click(); e.preventDefault(); }
  else if (key === '/' || key === 'q') { document.getElementById('btn-chute').click(); e.preventDefault(); }
});

// Legend drawing
function drawLegend() {
  const step = document.getElementById('legend-step').getContext('2d');
  step.strokeStyle = '#2a2a2a'; step.lineWidth = 2;
  step.beginPath(); step.moveTo(0,1); step.lineTo(20,1); step.stroke();

  const jump = document.getElementById('legend-jump').getContext('2d');
  jump.strokeStyle = '#2a2a2a'; jump.lineWidth = 2;
  jump.setLineDash([6,4]);
  jump.beginPath(); jump.moveTo(0,1); jump.lineTo(20,1); jump.stroke();

  const chute = document.getElementById('legend-chute').getContext('2d');
  chute.strokeStyle = '#5a3a2a'; chute.lineWidth = 2;
  chute.setLineDash([3,3]);
  chute.beginPath(); chute.moveTo(0,1); chute.lineTo(20,1); chute.stroke();
}

// Resize handler
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(render, 100);
});

// Init
drawLegend();
render();
</script>
</body>
</html>
