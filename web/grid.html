<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #141418;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  gap: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr) 12px repeat(4, 1fr);
  gap: 6px;
  width: 100%;
  max-width: 720px;
}

.grid-spacer {
  width: 12px;
}

.cell {
  aspect-ratio: 1;
  background: #26262e;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: 2px solid transparent;
  transition: background 0.15s, border-color 0.15s;
}

.cell.active {
  border-color: #5a5a66;
  background: #2c2c34;
}
.cell.active.mirror {
  border-color: #f0f0ff;
  background: #32323c;
}

.cell-name {
  color: #a8a8b4;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  pointer-events: none;
}

.cell.active .cell-name {
  color: #e8e8f0;
}


#nav-controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
#nav-controls .nav-row {
  display: flex;
  gap: 6px;
}
.nav-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #26262e;
  border: none;
  color: #a8a8b4;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:hover:not(:disabled) { background: #32323c; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<div id="nav-controls">
  <div class="nav-row"><button class="nav-btn" id="btn-up">W</button></div>
  <div class="nav-row">
    <button class="nav-btn" id="btn-left">A</button>
    <button class="nav-btn" id="btn-chute">/</button>
    <button class="nav-btn" id="btn-right">D</button>
  </div>
  <div class="nav-row"><button class="nav-btn" id="btn-down">S</button></div>
  <div class="nav-row"><button class="nav-btn" id="btn-flip" style="font-size:11px;width:auto;padding:0 10px;border-radius:16px;">flip</button></div>
</div>
<script>
const ROWS = 4, COLS = 4;

const cellNames = [
  ['Adaptation','Rest','Diagnose','Itemize'],
  ['Attempt','Realization','Work','Mobilization'],
  ['Coverage','Showing Up','Friction','Travelling'],
  ['Maintain','Utilization','Rearrange','Switch Out']
];

// Reflected 4x4: reflected[rr][rc] = cellNames[src_r][src_c]
// where src_r = rr<2 ? 3-rr : rr-2, src_c = rc<2 ? 3-rc : rc-2
const reflected = Array.from({length:4}, () => Array(4).fill(''));
for (let rr = 0; rr < 4; rr++) {
  for (let rc = 0; rc < 4; rc++) {
    const sr = rr < 2 ? 3 - rr : rr - 2;
    const sc = rc < 2 ? 3 - rc : rc - 2;
    reflected[rr][rc] = cellNames[sr][sc];
  }
}

// Navigation
const horizNext = {0:2, 2:3, 3:1, 1:0};
const vertNext  = {0:2, 2:3, 3:1, 1:0};

const chuteDefs = [[0,0,3,2],[0,1,3,3],[0,2,3,0],[0,3,3,1],[1,0,2,2],[1,1,2,3],[2,0,1,2],[2,1,1,3]];
const chuteLookup = {};
chuteDefs.forEach(([r1,c1,r2,c2]) => {
  const a = r1*4+c1, b = r2*4+c2;
  chuteLookup[a] = b;
  chuteLookup[b] = a;
});

let activeR = 0, activeC = 0;

const grid = document.getElementById('grid');
const leftCells = []; // reflected side
const rightCells = []; // original side

for (let r = 0; r < ROWS; r++) {
  // Left 4 (reflected)
  for (let c = 0; c < COLS; c++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    const span = document.createElement('span');
    span.className = 'cell-name';
    span.textContent = reflected[r][c];
    cell.appendChild(span);
    cell.classList.add('left-cell');
    leftCells.push(cell);
    grid.appendChild(cell);
  }
  // Spacer column
  const spacer = document.createElement('div');
  spacer.className = 'grid-spacer';
  grid.appendChild(spacer);
  // Right 4 (original)
  for (let c = 0; c < COLS; c++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    const span = document.createElement('span');
    span.className = 'cell-name';
    span.textContent = cellNames[r][c];
    cell.appendChild(span);
    cell.addEventListener('click', () => {
      activeR = r; activeC = c;
      render();
    });
    rightCells.push(cell);
    grid.appendChild(cell);
  }
}

// Map original 4x4 coord to reflected grid index (inverse of reflection)
function getReflectionIdx(r, c) {
  let rr = r < 2 ? r + 2 : 3 - r;
  let rc = c < 2 ? c + 2 : 3 - c;
  if (isFlipped) { rr = 3 - rr; rc = 3 - rc; }
  return rr * COLS + rc;
}

function render() {
  leftCells.forEach(c => c.classList.remove('active', 'mirror'));
  rightCells.forEach(c => c.classList.remove('active', 'mirror'));

  // Right side always dim
  rightCells[activeR * COLS + activeC].classList.add('active');
  // Left side always bright
  leftCells[getReflectionIdx(activeR, activeC)].classList.add('active', 'mirror');

  updateNav();
}

function updateNav() {
  document.getElementById('btn-up').disabled = !(activeR===3||activeR===1);
  document.getElementById('btn-down').disabled = !(activeR===0||activeR===2);
  document.getElementById('btn-left').disabled = !(activeC===3||activeC===1);
  document.getElementById('btn-right').disabled = !(activeC===0||activeC===2);
  document.getElementById('btn-chute').disabled = chuteLookup[activeR*4+activeC] === undefined;
}

document.getElementById('btn-up').addEventListener('click', () => {
  if (activeR===3) activeR=1;
  else if (activeR===1) activeR=0;
  render();
});
document.getElementById('btn-down').addEventListener('click', () => {
  if (activeR===0) activeR=2;
  else if (activeR===2) activeR=3;
  render();
});
document.getElementById('btn-left').addEventListener('click', () => {
  if (activeC===3) activeC=1;
  else if (activeC===1) activeC=0;
  render();
});
document.getElementById('btn-right').addEventListener('click', () => {
  if (activeC===0) activeC=2;
  else if (activeC===2) activeC=3;
  render();
});
document.getElementById('btn-chute').addEventListener('click', () => {
  const idx = activeR*4+activeC;
  if (chuteLookup[idx] !== undefined) {
    const t = chuteLookup[idx];
    activeR = Math.floor(t/4);
    activeC = t%4;
    render();
  }
});

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'w' || key === 'arrowup') { document.getElementById('btn-up').click(); e.preventDefault(); }
  else if (key === 's' || key === 'arrowdown') { document.getElementById('btn-down').click(); e.preventDefault(); }
  else if (key === 'a' || key === 'arrowleft') { document.getElementById('btn-left').click(); e.preventDefault(); }
  else if (key === 'd' || key === 'arrowright') { document.getElementById('btn-right').click(); e.preventDefault(); }
  else if (key === '/' || key === 'q') { document.getElementById('btn-chute').click(); e.preventDefault(); }
});

let isFlipped = false;

function updateLeftNames() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      let sr, sc;
      if (isFlipped) {
        // Mirror vertically and horizontally around bottom-right corner
        sr = 3 - r;
        sc = 3 - c;
      } else {
        sr = r;
        sc = c;
      }
      leftCells[idx].querySelector('.cell-name').textContent = reflected[sr][sc];
    }
  }
}

document.getElementById('btn-flip').addEventListener('click', () => {
  isFlipped = !isFlipped;
  document.getElementById('btn-flip').style.background = isFlipped ? '#3a3a44' : '';
  updateLeftNames();
  render();
});

render();
</script>
</body>
</html>
