<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #141418;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  width: 100%;
  max-width: 540px;
}

.cell {
  aspect-ratio: 1;
  background: #26262e;
  border-radius: 6px;
}

.cell.empty {
  background: transparent;
}
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<script>
const SIZE = 6;
const grid = document.getElementById('grid');

for (let r = 0; r < SIZE; r++) {
  for (let c = 0; c < SIZE; c++) {
    const cell = document.createElement('div');
    // Top-right 2x2: r<2, c>=4
    // Bottom-left 2x2: r>=4, c<2
    const isEmpty = (r < 2 && c >= 4) || (r >= 4 && c < 2);
    cell.className = isEmpty ? 'cell empty' : 'cell';
    cell.dataset.row = r;
    cell.dataset.col = c;
    grid.appendChild(cell);
  }
}
</script>
</body>
</html>
